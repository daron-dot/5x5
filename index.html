    if(td){ state.todayCompleted=td.completed||[]; state.todayNote=td.note||""; state.todayListsDone=td.listsDone||[]; }
    const wr=state.checkins["weekly_"+todayStr()];
    if(wr){ state.weeklyWins=wr.wins||""; state.weeklyChallenges=wr.challenges||""; state.weeklyAdjustments=wr.adjustments||""; }
  } catch(e){}
}

// ---- TIMELINE VIEW ----
function renderTimeline(){
  const sorted=[...state.todayBricks].sort((a,b)=>timeToMins(a.start)-timeToMins(b.start));
  if(!sorted.length) return `<div class="empty-msg">No bricks yet.</div>`;
  const minStart=timeToMins(sorted[0].start);
  const maxEnd=Math.max(...sorted.map(b=>timeToMins(b.end)));
  const totalMins=maxEnd-minStart;
  const PX_PER_MIN=2.2;
  const totalHeight=totalMins*PX_PER_MIN;

  // Build hour labels
  const startHour=Math.floor(minStart/60);
  const endHour=Math.ceil(maxEnd/60);
  let hourLabels="";
  for(let h=startHour;h<=endHour;h++){
    const top=((h*60)-minStart)*PX_PER_MIN;
    const label=h<12?"12"===String(h)?"12am":`${h}am`:h===12?"12pm":`${h-12}pm`;
    hourLabels+=`<div style="position:absolute;top:${top}px;right:0;font-size:10px;color:#bbb;line-height:1;transform:translateY(-50%)">${label}</div>`;
    // grid line
  }

  const bricks=sorted.map(brick=>{
    const c=cat(brick.category);
    const top=(timeToMins(brick.start)-minStart)*PX_PER_MIN;
    const height=(timeToMins(brick.end)-timeToMins(brick.start))*PX_PER_MIN;
    const showTime=height>24;
    const showLabel=height>14;
    return `<div class="timeline-brick" style="top:${top}px;height:${height-2}px;background:${c.light};border-left-color:${c.color}" onclick="state.editingBrickId='${brick.id}';state.brickView='list';persist('brickView');render()">
      ${showLabel?`<div class="timeline-brick-label" style="color:${c.color}">${brick.label}</div>`:""}
      ${showTime?`<div class="timeline-brick-time" style="color:${c.color}">${brick.start}–${brick.end}</div>`:""}
    </div>`;
  }).join("");

  return `<div class="timeline-wrap">
    <div style="width:44px;flex-shrink:0;position:relative;height:${totalHeight}px">${hourLabels}</div>
    <div style="flex:1;position:relative;height:${totalHeight}px;border-left:1px solid #f0f0f0;margin-left:4px">
      ${bricks}
    </div>
  </div>`;
}

    <div style="font-size:11px;color:#aaa;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">Today's Template</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px">

    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button onclick="editTemplate('${state.activeTemplateId}')" class="btn-ghost" style="font-size:12px">Rename</button>

  const viewToggle=`<div class="view-toggle">
    <button class="pill-toggle" style="background:${state.brickView==="list"?"#222":"#eee"};color:${state.brickView==="list"?"#fff":"#555"}" onclick="state.brickView='list';persist('brickView');render()">List</button>
    <button class="pill-toggle" style="background:${state.brickView==="timeline"?"#222":"#eee"};color:${state.brickView==="timeline"?"#fff":"#555"}" onclick="state.brickView='timeline';persist('brickView');render()">Timeline</button>
    <button class="btn-primary btn-small" style="background:#1a1a1a;margin-left:auto" onclick="state.showAddBrick=true;render()">+ Add</button>
  </div>`;

  const listRows=sorted.map((brick,idx)=>{
    const c=cat(brick.category);
    if(state.editingBrickId===brick.id){
      return `<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
        <div style="display:flex;flex-direction:column;gap:2px">
          <button class="arrow-btn" onclick="moveBrick('${brick.id}',-1)">▲</button>
          <button class="arrow-btn" onclick="moveBrick('${brick.id}',1)">▼</button>
        </div>
        <div style="flex:1;border-radius:10px;padding:12px 14px;background:${c.light};border-left:4px solid ${c.color};display:flex;flex-direction:column;gap:8px">
          <input value="${brick.label}" onchange="updateBrickField('${brick.id}','label',this.value)" />
          <div class="flex-row">
            <input type="time" value="${brick.start}" onchange="updateBrickField('${brick.id}','start',this.value)" />
            <input type="time" value="${brick.end}" onchange="updateBrickField('${brick.id}','end',this.value)" />
          </div>
          <select onchange="updateBrickField('${brick.id}','category',this.value)">
            ${CATEGORIES.map(c=>`<option value="${c.id}"${brick.category===c.id?" selected":""}>${c.label}</option>`).join("")}
          </select>
          <button class="btn-primary btn-small" style="background:${c.color}" onclick="state.editingBrickId=null;render()">Done</button>
        </div>
      </div>`;
    }
    const mins=timeToMins(brick.end)-timeToMins(brick.start);
    return `<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
      <div style="display:flex;flex-direction:column;gap:2px">
        <button class="arrow-btn" onclick="moveBrick('${brick.id}',-1)">▲</button>
        <button class="arrow-btn" onclick="moveBrick('${brick.id}',1)">▼</button>
      </div>
      <div style="flex:1;border-radius:10px;padding:12px 14px;background:${c.light};border-left:4px solid ${c.color};display:flex;justify-content:space-between;align-items:center">
        <div>
          <div style="font-weight:600;font-size:14px">${brick.label}</div>
          <div style="font-size:12px;color:#888">${brick.start} – ${brick.end} <span style="color:#bbb">(${mins}m)</span></div>
        </div>
        <div class="flex-row">
          <button class="btn-ghost" onclick="state.editingBrickId='${brick.id}';render()">Edit</button>
          <button class="btn-ghost btn-danger" onclick="deleteTodayBrick('${brick.id}')">✕</button>
        </div>
      </div>
    </div>`;
  }).join("");

  const dateBar=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <span style="color:#888;font-size:13px">${new Date().toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"})}</span>
  </div>`;

  const restartBtn=`<button class="btn-restart" onclick="doRestart()">↺ Fresh Start — Reset Today</button>`;

  return `${templateBar}${viewToggle}${dateBar}
    <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px">${legend}</div>
    ${state.brickView==="timeline"?renderTimeline():listRows}
    ${restartBtn}`;
}

function loadTemplate(id){
  const t=state.templates.find(t=>t.id===id);
  if(!t) return;
  state.activeTemplateId=id;
  state.todayBricks=deepCopy(t.bricks);
  persist("activeTemplateId"); persist("todayBricks"); render();
}

function saveTodayToTemplate(){
  state.templates=state.templates.map(t=>t.id===state.activeTemplateId?{...t,bricks:deepCopy(state.todayBricks)}:t);
  persist("templates"); alert("Saved to template.");
}

function moveBrick(id,dir){
  const sorted=[...state.todayBricks].sort((a,b)=>timeToMins(a.start)-timeToMins(b.start));
  const idx=sorted.findIndex(b=>b.id===id), target=idx+dir;
  if(target<0||target>=sorted.length) return;
  const t1=sorted[idx].start,e1=sorted[idx].end;
  sorted[idx]={...sorted[idx],start:sorted[target].start,end:sorted[target].end};
  sorted[target]={...sorted[target],start:t1,end:e1};
  state.todayBricks=sorted; persist("todayBricks"); render();
}

function updateBrickField(id,field,val){
  state.todayBricks=state.todayBricks.map(b=>b.id===id?{...b,[field]:val}:b);
  persist("todayBricks");
}

function deleteTodayBrick(id){ state.todayBricks=state.todayBricks.filter(b=>b.id!==id); persist("todayBricks"); render(); }

function editTemplate(id){
  state.editingTemplateId=id;
  const t=state.templates.find(t=>t.id===id);
  state.newTemplateName=t?t.name:"";
  state.showAddTemplate=true; render();
}

function deleteTemplate(id){
  if(state.templates.length<=1) return;
  state.templates=state.templates.filter(t=>t.id!==id);
  state.activeTemplateId=state.templates[0].id;
  state.todayBricks=deepCopy(state.templates[0].bricks);
  persist("templates"); persist("activeTemplateId"); persist("todayBricks"); render();
}

function renderAddTemplateModal(){
  const isEdit=!!state.editingTemplateId;
  return `<div class="modal-overlay" onclick="if(event.target===this){state.showAddTemplate=false;state.editingTemplateId=null;render()}">
    <div class="modal-box">
      <div class="modal-title">${isEdit?"Rename Template":"New Template"}</div>
      <div class="flex-col">
        <input id="tname" placeholder="e.g. MWF, Travel Day, Light Day" value="${state.newTemplateName}" oninput="state.newTemplateName=this.value" />
        ${!isEdit?`<div class="sub-text" style="margin:0">Copies today's bricks as the starting point.</div>`:""}
        <div class="flex-row">
          <button class="btn-primary" onclick="saveTemplate()">${isEdit?"Save":"Create"}</button>
          <button class="btn-ghost" onclick="state.showAddTemplate=false;state.editingTemplateId=null;render()">Cancel</button>
        </div>
      </div>
    </div>
  </div>`;
}

function saveTemplate(){
  const el=document.getElementById("tname");
  const name=(el?el.value:state.newTemplateName).trim();
  if(!name) return;
  if(state.editingTemplateId){
    state.templates=state.templates.map(t=>t.id===state.editingTemplateId?{...t,name}:t);
  } else {
    const newT={id:uid(),name,bricks:deepCopy(state.todayBricks)};
    state.templates.push(newT);
    state.activeTemplateId=newT.id;
  }
  state.newTemplateName=""; state.editingTemplateId=null; state.showAddTemplate=false;
  persist("templates"); persist("activeTemplateId"); render();
}

// MILESTONES
function renderMilestones(){
  const total=state.milestones.length, done=state.milestones.filter(m=>m.done).length;
  const pct=total>0?Math.round((done/total)*100):0;
  const circles=CATEGORIES.map(c=>{ const cm=state.milestones.filter(m=>m.category===c.id); if(!cm.length) return ""; const cd=cm.filter(m=>m.done).length; return `<div class="cat-circle" style="background:${c.light};border-color:${c.color};color:${c.color}">${cd}/${cm.length}</div>`; }).join("");
  const sections=CATEGORIES.map(c=>{ const cm=state.milestones.filter(m=>m.category===c.id); const cdone=cm.filter(m=>m.done).length;
    const rows=cm.map(m=>{ const g=state.goals.find(g=>g.id===m.goalId);
      return `<div class="milestone-card" style="background:${m.done?c.light:"#fafafa"};border-color:${m.done?c.color:"#eee"}">
        <button class="check-circle" style="background:${m.done?c.color:"#ddd"}" onclick="toggleMilestone('${m.id}')">${m.done?"✓":""}</button>
        <div style="flex:1"><div style="font-size:13px;color:${m.done?"#888":"#222"};text-decoration:${m.done?"line-through":"none"};font-weight:${m.done?400:500}">${m.text}</div>${g?`<div class="linked-goal">→ ${g.text}</div>`:""}</div>
        <button class="btn-ghost btn-danger" onclick="deleteMilestone('${m.id}')">✕</button>
      </div>`;
    }).join("");
    return `<div style="margin-bottom:22px"><div class="cat-row"><div class="cat-dot" style="background:${c.color}"></div><span class="cat-label" style="color:${c.color}">${c.label}</span><span class="goal-count">${cdone}/${cm.length}</span></div>${rows||`<div class="empty-msg">No milestones this month.</div>`}</div>`;
  }).join("");
  const goalOptions=state.goals.filter(g=>g.category===state.newMilestone.category).map(g=>`<option value="${g.id}"${state.newMilestone.goalId===g.id?" selected":""}>${g.text}</option>`).join("");

// LISTS
function renderLists(){
  const projects=[...new Set(state.lists.map(l=>l.project).filter(Boolean))];
  const completedCount=state.lists.filter(l=>l.done).length;
  let body="";
  if(state.listView==="category"){
    body=CATEGORIES.map(c=>{ const items=state.lists.filter(l=>l.category===c.id);
      const rows=items.map(item=>`<div class="list-row" style="margin-left:16px">
        <button style="font-size:16px;color:${item.done?"#4BAF7C":"#ccc"};background:none;border:none;cursor:pointer;padding:0" onclick="toggleList('${item.id}')">${item.done?"✓":"○"}</button>

        ${item.project?`<span class="tag-pill">${item.project}</span>`:""}
        <button class="btn-ghost btn-danger" onclick="deleteList('${item.id}')">✕</button>
      </div>`).join("");
      return `<div style="margin-bottom:18px"><div class="cat-row"><div class="cat-dot" style="background:${c.color}"></div><span class="cat-label" style="color:${c.color}">${c.label}</span></div>${rows||`<div class="empty-msg">Nothing here yet.</div>`}</div>`;
    }).join("");
  } else {
    const ps=projects.map(proj=>{ const items=state.lists.filter(l=>l.project===proj);
      const rows=items.map(item=>{ const c=cat(item.category); return `<div class="list-row" style="border-left:3px solid ${c.color};padding-left:10px">
        <button style="font-size:16px;color:${item.done?"#4BAF7C":"#ccc"};background:none;border:none;cursor:pointer;padding:0" onclick="toggleList('${item.id}')">${item.done?"✓":"○"}</button>
        <span style="flex:1;font-size:13px;color:${item.done?"#bbb":"#333"};text-decoration:${item.done?"line-through":"none"}">${item.text}</span>
        <button class="btn-ghost btn-danger" onclick="deleteList('${item.id}')">✕</button>
      </div>`; }).join("");
      return `<div style="margin-bottom:18px"><div style="font-weight:600;font-size:13px;color:#444;margin-bottom:8px">${proj}</div>${rows}</div>`;
    }).join("");
    const untagged=state.lists.filter(l=>!l.project);
    const ur=untagged.map(item=>`<div class="list-row">
      <button style="font-size:16px;color:${item.done?"#4BAF7C":"#ccc"};background:none;border:none;cursor:pointer;padding:0" onclick="toggleList('${item.id}')">${item.done?"✓":"○"}</button>
      <span style="flex:1;font-size:13px;color:${item.done?"#bbb":"#333"};text-decoration:${item.done?"line-through":"none"}">${item.text}</span>
      <button class="btn-ghost btn-danger" onclick="deleteList('${item.id}')">✕</button>
    </div>`).join("");
    body=ps+(untagged.length?`<div style="margin-bottom:18px"><div style="font-weight:600;font-size:13px;color:#aaa;margin-bottom:8px">No Project</div>${ur}</div>`:"");
    if(!body.trim()) body=`<div class="empty-msg" style="margin-bottom:20px">No tasks yet.</div>`;
  }
  const archiveDates=Object.keys(state.listArchive).sort().reverse().slice(0,5);
  const archiveSection=archiveDates.length?`<hr class="section-divider"/><div class="section-head">Archive</div><div class="sub-text">Completed tasks from previous days.</div>${archiveDates.map(d=>`<div style="margin-bottom:14px"><div style="font-size:12px;font-weight:600;color:#aaa;margin-bottom:6px">${d}</div>${state.listArchive[d].map(item=>`<div class="archive-item"><span style="font-size:13px;color:#bbb;text-decoration:line-through">${item.text}</span>${item.project?` <span class="tag-pill">${item.project}</span>`:""}</div>`).join("")}</div>`).join("")}`:"";
  return `<div class="flex-row" style="margin-bottom:20px">
      <button class="pill-toggle" style="background:${state.listView==="category"?"#222":"#eee"};color:${state.listView==="category"?"#fff":"#555"}" onclick="state.listView='category';render()">By Category</button>
      <button class="pill-toggle" style="background:${state.listView==="project"?"#222":"#eee"};color:${state.listView==="project"?"#fff":"#555"}" onclick="state.listView='project';render()">By Project</button>
    </div>${body}
    ${completedCount>0?`<button class="btn-primary full" style="background:#4BAF7C;margin-bottom:24px" onclick="archiveCompletedLists()">Archive ${completedCount} completed task${completedCount!==1?"s":""}</button>`:""}

      <select onchange="state.newItem.category=this.value">${CATEGORIES.map(c=>`<option value="${c.id}"${state.newItem.category===c.id?" selected":""}>${c.label}</option>`).join("")}</select>

      <button class="btn-primary" onclick="addList()">Add to List</button>
    </div>${archiveSection}`;
}

// CHECK-IN
function renderCheckin(){
  const sorted=[...state.todayBricks].sort((a,b)=>timeToMins(a.start)-timeToMins(b.start));
  const total=sorted.length, done=state.todayCompleted.length;
  const pct=total>0?Math.round((done/total)*100):0;

  // category balance bars
  const catBars=CATEGORIES.map(c=>{
    const cBricks=sorted.filter(b=>b.category===c.id);
    const cDone=cBricks.filter(b=>state.todayCompleted.includes(b.id)).length;
    if(!cBricks.length) return "";
    const cpct=Math.round((cDone/cBricks.length)*100);
    return `<div style="margin-bottom:6px">
      <div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px">
        <span style="color:${c.color};font-weight:600">${c.label}</span>
        <span style="color:#aaa">${cDone}/${cBricks.length}</span>
      </div>
      <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${cpct}%;background:${c.color}"></div></div>
    </div>`;
  }).join("");

  const brickRows=sorted.map(brick=>{
    const c=cat(brick.category);
    const isDone=state.todayCompleted.includes(brick.id);
    const mins=timeToMins(brick.end)-timeToMins(brick.start);
    return `<div class="checkin-brick" style="background:${isDone?c.light:"#fafafa"};border-color:${isDone?c.color:"#eee"}" onclick="toggleCheckin('${brick.id}')">
      <div class="checkin-box" style="background:${isDone?c.color:"#ddd"}">${isDone?"✓":""}</div>
      <span style="font-size:13px;color:${isDone?"#222":"#888"};font-weight:${isDone?600:400};flex:1">${brick.label}</span>
      <span style="font-size:11px;color:#bbb">${brick.start} · ${mins}m</span>
    </div>`;
  }).join("");

  // List review
  const pendingLists=state.lists.filter(l=>!l.done);
  const listReviewRows=state.lists.map(item=>{
    const c=cat(item.category);
    const isChecked=state.todayListsDone.includes(item.id)||item.done;
    return `<div style="display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;background:${isChecked?c.light:"#fafafa"};border:1px solid ${isChecked?c.color:"#eee"};margin-bottom:6px;cursor:pointer" onclick="toggleListCheckin('${item.id}')">
      <div style="width:20px;height:20px;border-radius:4px;background:${isChecked?c.color:"#ddd"};display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px;color:#fff">${isChecked?"✓":""}</div>
      <span style="flex:1;font-size:13px;color:${isChecked?"#888":"#333"};text-decoration:${isChecked?"line-through":"none"}">${item.text}</span>
      ${item.project?`<span class="tag-pill">${item.project}</span>`:""}
      <div style="width:8px;height:8px;border-radius:2px;background:${c.color};flex-shrink:0"></div>
    </div>`;
  }).join("");

  const saturday=isSaturday();
  const weeklySection=saturday?`<hr class="divider"/>
    <div class="section-head">Saturday Weekly Review</div>
    <div class="sub-text">Review the week. Adjust bricks. Sunday is rest.</div>
    <label>Wins this week</label>
    <textarea rows="3" onchange="state.weeklyWins=this.value" placeholder="What worked? What moved?">${state.weeklyWins}</textarea>
    <label>Challenges</label>
    <textarea rows="3" onchange="state.weeklyChallenges=this.value" placeholder="What got in the way?">${state.weeklyChallenges}</textarea>
    <label>Adjustments for next week</label>
    <textarea rows="3" onchange="state.weeklyAdjustments=this.value" placeholder="What bricks need to move?">${state.weeklyAdjustments}</textarea>
    <button class="btn-primary full" style="background:#8B5DB8;margin-top:12px" onclick="saveWeekly();this.textContent='Saved ✓'">Save Weekly Review</button>`:"";

  return `<div class="progress-box">
      <div style="font-size:13px;color:#888;margin-bottom:8px">Today's completion</div>
      <div style="display:flex;align-items:flex-end;gap:16px;margin-bottom:12px">
        <div><div class="progress-pct">${pct}%</div><div class="progress-sub">${done} of ${total} bricks</div></div>
        <div style="flex:1">${catBars}</div>
      </div>
      <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${pct}%;background:#6B7FD7"></div></div>
    </div>

    <div class="section-head">Bricks — what got done?</div>
    ${brickRows}

    <hr class="section-divider"/>
    <div class="section-head">Lists — what moved today?</div>
    <div class="sub-text">Tap what you completed. Archive when done.</div>
    ${listReviewRows||'<div class="empty-msg">No active tasks.</div>'}
    ${state.lists.some(l=>l.done||state.todayListsDone.includes(l.id))?`<button class="btn-primary full" style="background:#4BAF7C;margin-top:8px;margin-bottom:4px" onclick="archiveCheckinCompleted()">Archive completed tasks</button>`:""}

    <label style="margin-top:20px">End of day note</label>
    <textarea rows="4" onchange="state.todayNote=this.value" placeholder="How did today go? What needs to move tomorrow?">${state.todayNote}</textarea>
    <button class="btn-primary full" style="margin-top:12px" onclick="saveCheckin();this.textContent='Saved ✓'">Save Check-In</button>
    ${weeklySection}`;
}

function toggleCheckin(id){
  if(state.todayCompleted.includes(id)) state.todayCompleted=state.todayCompleted.filter(i=>i!==id);
  else state.todayCompleted.push(id);
  render();
}

function toggleListCheckin(id){
  if(state.todayListsDone.includes(id)){
    state.todayListsDone=state.todayListsDone.filter(i=>i!==id);
    state.lists=state.lists.map(l=>l.id===id?{...l,done:false}:l);
  } else {
    state.todayListsDone.push(id);
    state.lists=state.lists.map(l=>l.id===id?{...l,done:true}:l);
  }
  persist("lists"); render();
}

function archiveCheckinCompleted(){
  const completed=state.lists.filter(l=>l.done);
  if(!completed.length) return;
  const dateKey=todayStr();
  if(!state.listArchive[dateKey]) state.listArchive[dateKey]=[];
  state.listArchive[dateKey].push(...completed);
  state.lists=state.lists.filter(l=>!l.done);
  state.todayListsDone=state.todayListsDone.filter(id=>state.lists.find(l=>l.id===id));
  persist("lists"); persist("listArchive"); render();
}

loadState();
persistAll();
render();
</script>
</body>
</html>
