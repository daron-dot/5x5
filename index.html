const cat = id => CATEGORIES.find(c=>c.id===id)||CATEGORIES[0];

const isSaturday = () => new Date().getDay()===6;
const currentMonth = () => new Date().toLocaleDateString("en-US",{month:"long",year:"numeric"});
const uid = () => Math.random().toString(36).substr(2,9);
const deepCopy = obj => JSON.parse(JSON.stringify(obj));

let state = {
  activeTab:"Bricks",
  templates:[{ id:"t1", name:"Standard Day", bricks:deepCopy(DEFAULT_TEMPLATE_BRICKS) }],
  activeTemplateId:"t1",
  todayBricks:deepCopy(DEFAULT_TEMPLATE_BRICKS),
  intentions:deepCopy(SEED_INTENTIONS),
  goals:deepCopy(SEED_GOALS),
  milestones:deepCopy(SEED_MILESTONES),
  lists:deepCopy(SEED_LISTS),
  listArchive:{},
  listView:"category",
  checkins:{},
  todayCompleted:[],
  todayNote:"",
  weeklyWins:"", weeklyChallenges:"", weeklyAdjustments:"",

  editingBrickId:null,
  showAddTemplate:false,
  editingTemplateId:null,
  newTemplateName:"",
  newBrick:{ category:"spiritual", label:"", start:"09:00", end:"09:30" },
  newIntention:"",
  newGoal:{ text:"", category:"spiritual" },
  newMilestone:{ text:"", category:"spiritual", goalId:"" },
  newItem:{ text:"", category:"spiritual", project:"" },
};

function loadState() {
  try {
    const keys = ["templates","activeTemplateId","todayBricks","intentions","goals","milestones","lists","listArchive","checkins"];
    keys.forEach(k => {
      const v = localStorage.getItem("5x5_"+k);
      if (v) state[k] = JSON.parse(v);
    });
    const td = state.checkins[todayStr()];
    if (td) { state.todayCompleted=td.completed||[]; state.todayNote=td.note||""; }
    const wr = state.checkins["weekly_"+todayStr()];
    if (wr) { state.weeklyWins=wr.wins||""; state.weeklyChallenges=wr.challenges||""; state.weeklyAdjustments=wr.adjustments||""; }
  } catch(e) {}
}

function persist(key) {
  try { localStorage.setItem("5x5_"+key, JSON.stringify(state[key])); } catch(e) {}
}

function persistAll() {
  ["templates","activeTemplateId","todayBricks","intentions","goals","milestones","lists","listArchive","checkins"].forEach(persist);
}

function saveCheckin() {
  state.checkins[todayStr()] = { completed:state.todayCompleted, note:state.todayNote };
  persist("checkins");
}

function saveWeekly() {
  state.checkins["weekly_"+todayStr()] = { wins:state.weeklyWins, challenges:state.weeklyChallenges, adjustments:state.weeklyAdjustments };
  persist("checkins");
}

function archiveCompletedLists() {
  const completed = state.lists.filter(l=>l.done);
  if (!completed.length) { alert("No completed tasks to archive."); return; }
  const dateKey = todayStr();
  if (!state.listArchive[dateKey]) state.listArchive[dateKey]=[];
  state.listArchive[dateKey].push(...completed);
  state.lists = state.lists.filter(l=>!l.done);
  persist("lists"); persist("listArchive");
  render();
}

function render() {
  document.getElementById("app").innerHTML = `

      <div class="header-eyebrow">Summer of Discipline</div>
      <div class="header-title">5×5 Bricks of Wellbeing</div>
    </div>
    <div class="tabs">${TABS.map(t=>`<button class="tab-btn${state.activeTab===t?" active":""}" onclick="setTab('${t}')">${t}</button>`).join("")}</div>
    <div id="content"></div>
    ${state.showAddBrick?renderAddBrickModal():""}
    ${state.showAddTemplate?renderAddTemplateModal():""}
  `;
  const content = document.getElementById("content");
  if (state.activeTab==="Bricks") content.innerHTML=renderBricks();
  else if (state.activeTab==="Intentions") content.innerHTML=renderIntentions();
  else if (state.activeTab==="Goals") content.innerHTML=renderGoals();
  else if (state.activeTab==="Milestones") content.innerHTML=renderMilestones();
  else if (state.activeTab==="Lists") content.innerHTML=renderLists();
  else if (state.activeTab==="Check-In") content.innerHTML=renderCheckin();
}

function setTab(t) { state.activeTab=t; render(); }

      </div>
    </div>`;
  const rows = sorted.map((brick,idx)=>{
    const c = cat(brick.category);
    if (state.editingBrickId===brick.id) {
      return `<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">

          <button class="arrow-btn" onclick="moveBrick('${brick.id}',-1)">▲</button>

        </div>
        <div class="brick-card" style="background:${c.light};border-left-color:${c.color};flex-direction:column;align-items:stretch;gap:8px">
          <input value="${brick.label}" onchange="updateBrickField('${brick.id}','label',this.value)" />
          <div class="flex-row">
            <input type="time" value="${brick.start}" onchange="updateBrickField('${brick.id}','start',this.value)" />
            <input type="time" value="${brick.end}" onchange="updateBrickField('${brick.id}','end',this.value)" />
          </div>
          <select onchange="updateBrickField('${brick.id}','category',this.value)">
            ${CATEGORIES.map(c=>`<option value="${c.id}"${brick.category===c.id?" selected":""}>${c.label}</option>`).join("")}
          </select>
          <button class="btn-primary btn-small" style="background:${c.color}" onclick="state.editingBrickId=null;render()">Done</button>
        </div>
      </div>`;
    }
    return `<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
      <div style="display:flex;flex-direction:column;gap:2px">
        <button class="arrow-btn" onclick="moveBrick('${brick.id}',-1)">▲</button>
        <button class="arrow-btn" onclick="moveBrick('${brick.id}',1)">▼</button>
      </div>
      <div class="brick-card" style="background:${c.light};border-left-color:${c.color}">
        <div><div class="brick-label">${brick.label}</div><div class="brick-time">${brick.start} – ${brick.end}</div></div>
        <div class="flex-row">
          <button class="btn-ghost" onclick="state.editingBrickId='${brick.id}';render()">Edit</button>
          <button class="btn-ghost btn-danger" onclick="deleteTodayBrick('${brick.id}')">✕</button>
        </div>
      </div>
    </div>`;
  }).join("");
  return `${templateBar}
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <span style="color:#888;font-size:13px">${new Date().toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"})}</span>
      <button class="btn-primary btn-small" style="background:#1a1a1a" onclick="state.showAddBrick=true;render()">+ Add Brick</button>
    </div>
    <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px">${legend}</div>
    ${rows}`;
}

function loadTemplate(id) {
  const t = state.templates.find(t=>t.id===id);
  if (!t) return;
  state.activeTemplateId=id;
  state.todayBricks=deepCopy(t.bricks);
  persist("activeTemplateId"); persist("todayBricks");
  render();
}

function saveTodayToTemplate() {
  state.templates = state.templates.map(t=>t.id===state.activeTemplateId?{...t,bricks:deepCopy(state.todayBricks)}:t);
  persist("templates");
  alert("Today's bricks saved to template.");
}

function moveBrick(id,dir) {
  const sorted=[...state.todayBricks].sort((a,b)=>a.start.localeCompare(b.start));
  const idx=sorted.findIndex(b=>b.id===id), target=idx+dir;
  if(target<0||target>=sorted.length) return;
  const t1=sorted[idx].start, e1=sorted[idx].end;
  sorted[idx]={...sorted[idx],start:sorted[target].start,end:sorted[target].end};
  sorted[target]={...sorted[target],start:t1,end:e1};
  state.todayBricks=sorted; persist("todayBricks"); render();
}

function updateBrickField(id,field,val) {
  state.todayBricks=state.todayBricks.map(b=>b.id===id?{...b,[field]:val}:b);
  persist("todayBricks");
}

function deleteTodayBrick(id) {
  state.todayBricks=state.todayBricks.filter(b=>b.id!==id);
  persist("todayBricks"); render();
}

function editTemplate(id) {
  state.editingTemplateId=id;
  const t=state.templates.find(t=>t.id===id);
  state.newTemplateName=t?t.name:"";
  state.showAddTemplate=true; render();
}

function deleteTemplate(id) {
  if(state.templates.length<=1) return;
  state.templates=state.templates.filter(t=>t.id!==id);
  state.activeTemplateId=state.templates[0].id;
  state.todayBricks=deepCopy(state.templates[0].bricks);
  persist("templates"); persist("activeTemplateId"); persist("todayBricks"); render();
}

function renderAddTemplateModal() {
  const isEdit=!!state.editingTemplateId;
  return `<div class="modal-overlay" onclick="if(event.target===this){state.showAddTemplate=false;state.editingTemplateId=null;render()}">
    <div class="modal-box">
      <div class="modal-title">${isEdit?"Rename Template":"New Template"}</div>
      <div class="flex-col">
        <input id="tname" placeholder="Template name (e.g. MWF, Travel Day)" value="${state.newTemplateName}" oninput="state.newTemplateName=this.value" />
        ${!isEdit?`<div class="sub-text" style="margin:0">Copies today's bricks as the starting point.</div>`:""}
        <div class="flex-row">
          <button class="btn-primary" onclick="saveTemplate()">${isEdit?"Save":"Create"}</button>
          <button class="btn-ghost" onclick="state.showAddTemplate=false;state.editingTemplateId=null;render()">Cancel</button>
        </div>
      </div>
    </div>
  </div>`;
}

function saveTemplate() {
  const name=(document.getElementById("tname")||{}).value||state.newTemplateName;
  if(!name.trim()) return;
  if(state.editingTemplateId) {
    state.templates=state.templates.map(t=>t.id===state.editingTemplateId?{...t,name:name.trim()}:t);
  } else {
    const newT={id:uid(),name:name.trim(),bricks:deepCopy(state.todayBricks)};
    state.templates.push(newT);
    state.activeTemplateId=newT.id;
  }
  state.newTemplateName=""; state.editingTemplateId=null; state.showAddTemplate=false;
  persist("templates"); persist("activeTemplateId"); render();
}

function renderAddBrickModal() {
  const nb=state.newBrick;
  return `<div class="modal-overlay" onclick="if(event.target===this){state.showAddBrick=false;render()}">
    <div class="modal-box">
      <div class="modal-title">New Brick</div>
      <div class="flex-col">
        <input id="nb-label" placeholder="Label" value="${nb.label}" oninput="state.newBrick.label=this.value" />
        <select onchange="state.newBrick.category=this.value">
          ${CATEGORIES.map(c=>`<option value="${c.id}"${nb.category===c.id?" selected":""}>${c.label}</option>`).join("")}
        </select>
        <div class="flex-row">
          <input type="time" value="${nb.start}" onchange="state.newBrick.start=this.value" />
          <input type="time" value="${nb.end}" onchange="state.newBrick.end=this.value" />
        </div>
        <div class="flex-row">
          <button class="btn-primary" onclick="addBrick()">Add</button>
          <button class="btn-ghost" onclick="state.showAddBrick=false;render()">Cancel</button>
        </div>
      </div>
    </div>
  </div>`;
}

function addBrick() {
  const el=document.getElementById("nb-label");
  const label=(el?el.value:state.newBrick.label).trim();
  if(!label) return;
  state.todayBricks.push({...state.newBrick,label,id:uid()});
  state.newBrick={category:"spiritual",label:"",start:"09:00",end:"09:30"};
  state.showAddBrick=false; persist("todayBricks"); render();
}

// INTENTIONS
function renderIntentions() {
  const rows=state.intentions.map(i=>`
    <div class="list-row">
      <span style="flex:1;font-size:14px;color:#333">${i.text}</span>
      <button class="btn-ghost btn-danger" onclick="deleteIntention('${i.id}')">✕</button>
    </div>`).join("");
  return `<div class="section-head">Intentions</div>
    <div class="sub-text">What you feel called to bring into form. No timeline. From the heart.</div>
    ${rows||'<div class="empty-msg">No intentions yet.</div>'}
    <div style="margin-top:12px">
      <textarea id="new-intention" rows="2" placeholder="Add an intention..." onchange="state.newIntention=this.value">${state.newIntention}</textarea>
      <button class="btn-primary btn-small" style="margin-top:8px" onclick="addIntention()">Add</button>
    </div>`;
}

function addIntention() {
  const el=document.getElementById("new-intention");
  const t=(el?el.value:state.newIntention).trim();
  if(!t) return;
  state.intentions.push({id:uid(),text:t});
  state.newIntention=""; persist("intentions"); render();
}

function deleteIntention(id) { state.intentions=state.intentions.filter(i=>i.id!==id); persist("intentions"); render(); }

// GOALS
function renderGoals() {
  const sections=CATEGORIES.map(c=>{
    const cg=state.goals.filter(g=>g.category===c.id);
    const rows=cg.map(g=>{
      const ms=state.milestones.filter(m=>m.goalId===g.id);
      const done=ms.filter(m=>m.done).length;
      return `<div class="list-row" style="margin-left:16px;margin-bottom:6px">
        <span style="flex:1;font-size:14px;color:#333">${g.text}</span>
        ${ms.length?`<span class="goal-count">${done}/${ms.length}</span>`:""}
        <button class="btn-ghost btn-danger" onclick="deleteGoal('${g.id}')">✕</button>
      </div>`;
    }).join("");
    return `<div style="margin-bottom:18px">
      <div class="cat-row"><div class="cat-dot" style="background:${c.color}"></div><span class="cat-label" style="color:${c.color}">${c.label}</span></div>
      ${rows||`<div class="empty-msg">No goals yet.</div>`}
    </div>`;
  }).join("");
  return `<div class="section-head">Goals</div>
    <div class="sub-text">No timeline. Add milestones in the Milestones tab.</div>
    ${sections}
    <hr class="section-divider"/>
    <div class="flex-col">
      <textarea id="new-goal-text" rows="2" placeholder="New goal..." onchange="state.newGoal.text=this.value">${state.newGoal.text}</textarea>
      <select onchange="state.newGoal.category=this.value">
        ${CATEGORIES.map(c=>`<option value="${c.id}"${state.newGoal.category===c.id?" selected":""}>${c.label}</option>`).join("")}
      </select>
      <button class="btn-primary" onclick="addGoal()">Add Goal</button>
    </div>`;
}

function addGoal() {
  const el=document.getElementById("new-goal-text");
  const t=(el?el.value:state.newGoal.text).trim();
  if(!t) return;
  state.goals.push({id:uid(),text:t,category:state.newGoal.category});
  state.newGoal={text:"",category:"spiritual"}; persist("goals"); render();
}

function deleteGoal(id) { state.goals=state.goals.filter(g=>g.id!==id); persist("goals"); render(); }

// MILESTONES
function renderMilestones() {
  const total=state.milestones.length, done=state.milestones.filter(m=>m.done).length;
  const pct=total>0?Math.round((done/total)*100):0;
  const circles=CATEGORIES.map(c=>{
    const cm=state.milestones.filter(m=>m.category===c.id);
    if(!cm.length) return "";
    const cd=cm.filter(m=>m.done).length;
    return `<div class="cat-circle" style="background:${c.light};border-color:${c.color};color:${c.color}">${cd}/${cm.length}</div>`;
  }).join("");
  const sections=CATEGORIES.map(c=>{
    const cm=state.milestones.filter(m=>m.category===c.id);
    const cdone=cm.filter(m=>m.done).length;
    const rows=cm.map(m=>{
      const g=state.goals.find(g=>g.id===m.goalId);
      return `<div class="milestone-card" style="background:${m.done?c.light:"#fafafa"};border-color:${m.done?c.color:"#eee"}">
        <button class="check-circle" style="background:${m.done?c.color:"#ddd"}" onclick="toggleMilestone('${m.id}')">${m.done?"✓":""}</button>
        <div style="flex:1">
          <div style="font-size:13px;color:${m.done?"#888":"#222"};text-decoration:${m.done?"line-through":"none"};font-weight:${m.done?400:500}">${m.text}</div>
          ${g?`<div class="linked-goal">→ ${g.text}</div>`:""}
        </div>
        <button class="btn-ghost btn-danger" onclick="deleteMilestone('${m.id}')">✕</button>
      </div>`;
    }).join("");
    return `<div style="margin-bottom:22px">
      <div class="cat-row"><div class="cat-dot" style="background:${c.color}"></div><span class="cat-label" style="color:${c.color}">${c.label}</span><span class="goal-count">${cdone}/${cm.length}</span></div>
      ${rows||`<div class="empty-msg">No milestones this month.</div>`}
    </div>`;
  }).join("");
  const goalOptions=state.goals.filter(g=>g.category===state.newMilestone.category)
    .map(g=>`<option value="${g.id}"${state.newMilestone.goalId===g.id?" selected":""}>${g.text}</option>`).join("");
  return `<div class="progress-box">
      <div style="font-size:10px;color:#aaa;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px">${currentMonth()}</div>
      <div style="display:flex;justify-content:space-between;align-items:flex-end">
        <div><div class="progress-pct">${pct}%</div><div class="progress-sub">${done} of ${total} complete</div></div>
        <div class="cat-circles">${circles}</div>
      </div>
      <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
    </div>
    ${sections}
    <hr class="section-divider"/>
    <div class="section-head">Add Milestone</div>
    <div class="flex-col">
      <textarea id="new-ms-text" rows="2" placeholder="This month I will..." onchange="state.newMilestone.text=this.value">${state.newMilestone.text}</textarea>
      <select onchange="state.newMilestone.category=this.value;state.newMilestone.goalId='';render()">
        ${CATEGORIES.map(c=>`<option value="${c.id}"${state.newMilestone.category===c.id?" selected":""}>${c.label}</option>`).join("")}
      </select>
      <select onchange="state.newMilestone.goalId=this.value">
        <option value="">Link to goal (optional)</option>
        ${goalOptions}
      </select>
      <button class="btn-primary" onclick="addMilestone()">Add Milestone</button>
    </div>`;
}

function toggleMilestone(id) { state.milestones=state.milestones.map(m=>m.id===id?{...m,done:!m.done}:m); persist("milestones"); render(); }
function deleteMilestone(id) { state.milestones=state.milestones.filter(m=>m.id!==id); persist("milestones"); render(); }
function addMilestone() {
  const el=document.getElementById("new-ms-text");
  const t=(el?el.value:state.newMilestone.text).trim();
  if(!t) return;
  state.milestones.push({id:uid(),text:t,category:state.newMilestone.category,goalId:state.newMilestone.goalId,done:false,month:currentMonth()});
  state.newMilestone={text:"",category:"spiritual",goalId:""}; persist("milestones"); render();
}

// LISTS
function renderLists() {
  const projects=[...new Set(state.lists.map(l=>l.project).filter(Boolean))];
  const completedCount=state.lists.filter(l=>l.done).length;
  let body="";
  if(state.listView==="category") {
    body=CATEGORIES.map(c=>{
      const items=state.lists.filter(l=>l.category===c.id);
      const rows=items.map(item=>`
        <div class="list-row" style="margin-left:16px">
          <button style="font-size:16px;color:${item.done?"#4BAF7C":"#ccc"};background:none;border:none;cursor:pointer;padding:0" onclick="toggleList('${item.id}')">${item.done?"✓":"○"}</button>
          <span style="flex:1;font-size:13px;color:${item.done?"#bbb":"#333"};text-decoration:${item.done?"line-through":"none"}">${item.text}</span>
          ${item.project?`<span class="tag-pill">${item.project}</span>`:""}
          <button class="btn-ghost btn-danger" onclick="deleteList('${item.id}')">✕</button>
        </div>`).join("");
      return `<div style="margin-bottom:18px">
        <div class="cat-row"><div class="cat-dot" style="background:${c.color}"></div><span class="cat-label" style="color:${c.color}">${c.label}</span></div>
        ${rows||`<div class="empty-msg">Nothing here yet.</div>`}
      </div>`;
    }).join("");
  } else {
    const projSections=projects.map(proj=>{
      const items=state.lists.filter(l=>l.project===proj);
      const rows=items.map(item=>{
        const c=cat(item.category);
        return `<div class="list-row" style="border-left:3px solid ${c.color};padding-left:10px">
          <button style="font-size:16px;color:${item.done?"#4BAF7C":"#ccc"};background:none;border:none;cursor:pointer;padding:0" onclick="toggleList('${item.id}')">${item.done?"✓":"○"}</button>
          <span style="flex:1;font-size:13px;color:${item.done?"#bbb":"#333"};text-decoration:${item.done?"line-through":"none"}">${item.text}</span>
          <button class="btn-ghost btn-danger" onclick="deleteList('${item.id}')">✕</button>
        </div>`;
      }).join("");
      return `<div style="margin-bottom:18px"><div style="font-weight:600;font-size:13px;color:#444;margin-bottom:8px">${proj}</div>${rows}</div>`;
    }).join("");
    const untagged=state.lists.filter(l=>!l.project);
    const untaggedRows=untagged.map(item=>`
      <div class="list-row">
        <button style="font-size:16px;color:${item.done?"#4BAF7C":"#ccc"};background:none;border:none;cursor:pointer;padding:0" onclick="toggleList('${item.id}')">${item.done?"✓":"○"}</button>
        <span style="flex:1;font-size:13px;color:${item.done?"#bbb":"#333"};text-decoration:${item.done?"line-through":"none"}">${item.text}</span>
        <button class="btn-ghost btn-danger" onclick="deleteList('${item.id}')">✕</button>
      </div>`).join("");
    body=projSections+(untagged.length?`<div style="margin-bottom:18px"><div style="font-weight:600;font-size:13px;color:#aaa;margin-bottom:8px">No Project</div>${untaggedRows}</div>`:"");
    if(!body.trim()) body=`<div class="empty-msg" style="margin-bottom:20px">No tasks yet.</div>`;
  }
  const archiveDates=Object.keys(state.listArchive).sort().reverse().slice(0,5);
  const archiveSection=archiveDates.length?`
    <hr class="section-divider"/>
    <div class="section-head">Archive</div>
    <div class="sub-text">Completed tasks from previous days.</div>
    ${archiveDates.map(d=>`<div style="margin-bottom:14px">
      <div style="font-size:12px;font-weight:600;color:#aaa;margin-bottom:6px">${d}</div>
      ${state.listArchive[d].map(item=>`<div class="archive-item"><span style="font-size:13px;color:#bbb;text-decoration:line-through">${item.text}</span>${item.project?` <span class="tag-pill">${item.project}</span>`:""}</div>`).join("")}
    </div>`).join("")}`:"";
  return `<div class="flex-row" style="margin-bottom:20px">
      <button class="pill-toggle" style="background:${state.listView==="category"?"#222":"#eee"};color:${state.listView==="category"?"#fff":"#555"}" onclick="state.listView='category';render()">By Category</button>
      <button class="pill-toggle" style="background:${state.listView==="project"?"#222":"#eee"};color:${state.listView==="project"?"#fff":"#555"}" onclick="state.listView='project';render()">By Project</button>
    </div>
    ${body}
    ${completedCount>0?`<button class="btn-primary full" style="background:#4BAF7C;margin-bottom:24px" onclick="archiveCompletedLists()">Archive ${completedCount} completed task${completedCount!==1?"s":""}</button>`:""}
    <hr class="section-divider"/>
    <div class="section-head">Add to List</div>
    <div class="flex-col">
      <textarea id="new-item-text" rows="2" placeholder="Task or note..." onchange="state.newItem.text=this.value">${state.newItem.text}</textarea>
      <select onchange="state.newItem.category=this.value">
        ${CATEGORIES.map(c=>`<option value="${c.id}"${state.newItem.category===c.id?" selected":""}>${c.label}</option>`).join("")}
      </select>
      <input id="new-item-project" placeholder="Project (optional)" value="${state.newItem.project}" onchange="state.newItem.project=this.value" />
      <button class="btn-primary" onclick="addList()">Add to List</button>
    </div>
    ${archiveSection}`;
}

function toggleList(id) { state.lists=state.lists.map(l=>l.id===id?{...l,done:!l.done}:l); persist("lists"); render(); }
function deleteList(id) { state.lists=state.lists.filter(l=>l.id!==id); persist("lists"); render(); }
function addList() {
  const el=document.getElementById("new-item-text");
  const elp=document.getElementById("new-item-project");
  const t=(el?el.value:state.newItem.text).trim();
  const p=(elp?elp.value:state.newItem.project).trim();
  if(!t) return;
  state.lists.push({id:uid(),text:t,category:state.newItem.category,project:p,done:false,date:todayStr()});
  state.newItem={text:"",category:"spiritual",project:""}; persist("lists"); render();
}

// CHECK-IN
function renderCheckin() {
  const sorted=[...state.todayBricks].sort((a,b)=>a.start.localeCompare(b.start));
  const total=sorted.length, done=state.todayCompleted.length;
  const pct=total>0?Math.round((done/total)*100):0;
  const brickRows=sorted.map(brick=>{
    const c=cat(brick.category);
    const isDone=state.todayCompleted.includes(brick.id);
    return `<div class="checkin-brick" style="background:${isDone?c.light:"#fafafa"};border-color:${isDone?c.color:"#eee"}" onclick="toggleCheckin('${brick.id}')">
      <div class="checkin-box" style="background:${isDone?c.color:"#ddd"}">${isDone?"✓":""}</div>
      <span style="font-size:13px;color:${isDone?"#222":"#888"};font-weight:${isDone?600:400};flex:1">${brick.label}</span>
      <span style="font-size:11px;color:#bbb">${brick.start}</span>
    </div>`;
  }).join("");
  const saturday=isSaturday();
  const weeklySection=saturday?`
    <hr class="divider"/>
    <div class="section-head">Saturday Weekly Review</div>
    <div class="sub-text">Review the week. Adjust the bricks. Sunday is rest.</div>
    <label>Wins this week</label>
    <textarea rows="3" onchange="state.weeklyWins=this.value" placeholder="What worked? What moved?">${state.weeklyWins}</textarea>
    <label>Challenges</label>
    <textarea rows="3" onchange="state.weeklyChallenges=this.value" placeholder="What got in the way?">${state.weeklyChallenges}</textarea>
    <label>Adjustments for next week</label>
    <textarea rows="3" onchange="state.weeklyAdjustments=this.value" placeholder="What bricks need to move?">${state.weeklyAdjustments}</textarea>
    <button class="btn-primary full" style="background:#8B5DB8;margin-top:12px" onclick="saveWeekly();this.textContent='Saved ✓'">Save Weekly Review</button>`:"";
  return `<div class="progress-box">
      <div style="font-size:13px;color:#888;margin-bottom:6px">Today's completion</div>
      <div class="progress-pct">${pct}%</div>
      <div class="progress-sub">${done} of ${total} bricks</div>
      <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="section-head">Which bricks did you complete today?</div>
    ${brickRows}
    <label style="margin-top:20px">End of day note</label>
    <textarea rows="4" onchange="state.todayNote=this.value" placeholder="How did today go? What needs to move tomorrow?">${state.todayNote}</textarea>
    <button class="btn-primary full" style="margin-top:12px" onclick="saveCheckin();this.textContent='Saved ✓'">Save Check-In</button>
    ${weeklySection}`;
}

function toggleCheckin(id) {
  if(state.todayCompleted.includes(id)) state.todayCompleted=state.todayCompleted.filter(i=>i!==id);
  else state.todayCompleted.push(id);
  render();
}

loadState();
persistAll();
render();
</script>
</body>
</html>
